name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    # Trigger on changes to dashboard sources, but also on any change to the
    # audit-source files the dashboard reads at build time (report.md,
    # analysis/*, skills/*) so the deployed dashboard never drifts behind the
    # source of truth.
    paths:
      - 'dashboard/**'
      - 'report.md'
      - 'analysis/**'
      - 'skills/**'
      - 'figures/**'
      - 'presentation/**'
      - 'EXECUTIVE_SUMMARY.md'
      - 'SKILL_AUTHORING_GUIDE.md'
      - 'methodology.md'
      - 'DECISIONS.md'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Python (for data regeneration)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate dashboard data from audit source
        # Re-runs scripts/build-data.py against the current source (../report.md,
        # ../analysis/, ../skills/, etc.) so the deployed dashboard always
        # matches HEAD even if the committed src/data/generated/*.json fall
        # behind. Cheap (~2-3 s) and prevents stale-data drift.
        run: npm run data

      - name: Build with Astro (base = /agentic-skill-behavioral-audit)
        env:
          BASE: /agentic-skill-behavioral-audit
          SITE: https://sirray03.github.io
        run: npm run build

      - name: Bundle presentation deck into /talk
        # Mounts the lightning-talk deck at /agentic-skill-behavioral-audit/talk/.
        # slides.html → index.html so the trailing-slash URL resolves.
        # figures/ ships verbatim (deck references figures/fig-NN.svg relatively).
        # No build step — Reveal.js loads from CDN; the deck is self-contained.
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p dashboard/dist/talk
          cp presentation/slides.html dashboard/dist/talk/index.html
          cp -r presentation/figures dashboard/dist/talk/figures

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
